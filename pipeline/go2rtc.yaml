# go2rtc media proxy config for Placebo
# Проксирует YouTube Live / RTSP / MJPEG → HLS для фронтенда
#
# Использование:
#   cd pipeline && docker compose up go2rtc -d
#   Открыть http://localhost:1984 для WebUI
#   HLS endpoint: http://localhost:1984/api/stream.m3u8?src=shibuya-crossing
#
# Для поиска YouTube Live ID:
#   1. Открыть youtube.com, поиск "shibuya crossing live camera 24/7"
#   2. Фильтр "Live" → скопировать video ID из URL
#   3. Заменить VIDEO_ID ниже на реальный ID

streams:
  # yt-dlp outputs YouTube HLS URL → go2rtc reads it directly (no ffmpeg)
  # Shibuya Scramble Crossing — Live Cam (cam 1)
  shibuya-crossing:
    - "echo:yt-dlp -f 'best[vcodec^=avc1]' --no-warnings -g https://www.youtube.com/watch?v=dfVK7ld38Ys"

  # Shibuya — Live Camera (cam 2)
  shibuya-station:
    - "echo:yt-dlp -f 'best[vcodec^=avc1]' --no-warnings -g https://www.youtube.com/watch?v=DjdUEyjx8GM"

  # Tokyo cam 3
  hachiko-square:
    - "echo:yt-dlp -f 'best[vcodec^=avc1]' --no-warnings -g https://www.youtube.com/watch?v=ehJbjfH1dIo"

  # Tokyo Shinjuku
  center-gai:
    - "echo:yt-dlp -f 'best[vcodec^=avc1]' --no-warnings -g https://www.youtube.com/watch?v=6dp-bvQ7RWo"

# WebRTC / API settings
api:
  listen: ":1984"

webrtc:
  listen: ":8555"

log:
  level: debug
