# Nginx config для локальной раздачи 3D Tiles
# CORS headers обязательны — Three.js fetch() требует их

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # CORS — разрешаем Tauri localhost обращаться к тайлам
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range, Content-Type" always;
    add_header Access-Control-Expose-Headers "Content-Range, Content-Length" always;

    # Кеширование — тайлы не меняются после генерации
    location ~* \.(b3dm|glb|json)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        # Повторяем CORS т.к. add_header в location затирает серверные
        add_header Access-Control-Allow-Origin "*" always;
    }

    # gzip для JSON (tileset.json может быть большим)
    gzip on;
    gzip_types application/json application/octet-stream;

    location / {
        try_files $uri $uri/ =404;
        autoindex on;     # Удобно для дебага — видеть список файлов
    }
}
